<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible ADHD-Friendly Spreadsheet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        /* Smooth focus transition to avoid jarring visual jumps */
        input:focus {
            transition: all 0.15s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-900 antialiased p-6">

    <div class="max-w-6xl mx-auto" x-data="spreadsheetApp()">
        
        <header class="mb-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-gray-900">Task & Budget Tracker</h1>
                <p class="text-sm text-gray-600">High-contrast grid with inline validation and column toggles to reduce visual noise.</p>
            </div>
            
            <div class="flex items-center gap-2 bg-white p-2 rounded-lg shadow-sm border border-gray-200 text-sm">
                <span class="font-semibold text-gray-700 px-2">Show Columns:</span>
                <template x-for="col in columns" :key="col.id">
                    <label class="inline-flex items-center mx-1 cursor-pointer bg-gray-50 hover:bg-gray-100 px-2 py-1 rounded border border-gray-300">
                        <input type="checkbox" x-model="col.visible" class="rounded text-indigo-600 focus:ring-indigo-500 mr-2">
                        <span x-text="col.label" class="text-gray-700"></span>
                    </label>
                </template>
            </div>
        </header>

        <div class="bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto max-h-[500px]">
                <table class="w-full text-left border-collapse table-fixed">

                    <!--
                        Column widths are controlled here, in one place, instead of on
                        individual <th>/<td> elements. A <col>'s width always wins over
                        any width set on a cell in table-fixed layout, so as long as this
                        stays in sync with the visible columns, the header row and body
                        rows can never disagree about how wide a column is - even as
                        columns are toggled on/off.
                    -->
                    <colgroup>
                        <col class="w-12">
                        <template x-for="col in columns" :key="'col-' + col.id">
                            <col :style="colStyle(col)">
                        </template>
                    </colgroup>

                    <thead class="sticky top-0 bg-gray-800 text-white z-10 shadow">
                        <tr>
                            <th class="w-12 p-3 text-center text-xs font-semibold tracking-wider text-gray-400">#</th>
                            <template x-for="col in columns" :key="col.id">
                                <th x-show="col.visible" class="p-3 text-sm font-semibold tracking-wide">
                                    <div class="flex items-center justify-between gap-2">
                                        <span x-text="col.label"></span>
                                        <button x-show="col.type === 'number'"
                                                @click="quickSum(col)"
                                                title="AutoSum this column"
                                                type="button"
                                                class="font-serif text-xs leading-none px-1.5 py-1 rounded text-gray-300 hover:text-white hover:bg-gray-700 transition-colors">
                                            Σ
                                        </button>
                                    </div>
                                </th>
                            </template>
                        </tr>
                    </thead>
                    
                    <tbody class="divide-y divide-gray-200">
                        <template x-for="(row, rowIndex) in rows" :key="row.id">
                            <tr class="hover:bg-indigo-50/40 transition-colors odd:bg-white even:bg-gray-50/80">
                                
                                <td class="p-3 text-center text-xs font-mono text-gray-400" x-text="rowIndex + 1"></td>
                                
                                <td x-show="columns[0].visible" class="p-2">
                                    <input type="text" x-model="row.taskName" 
                                           placeholder="Enter task description..."
                                           class="w-full bg-transparent px-2 py-1 rounded border border-transparent hover:border-gray-300 focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 focus:outline-none text-sm">
                                </td>
                                
                                <td x-show="columns[1].visible" class="p-2">
                                    <select x-model="row.category" 
                                            class="w-full bg-transparent px-2 py-1 rounded border border-transparent hover:border-gray-300 focus:bg-white focus:border-indigo-500 focus:outline-none text-sm cursor-pointer">
                                        <option value="Development">Development</option>
                                        <option value="Design">Design</option>
                                        <option value="Marketing">Marketing</option>
                                        <option value="Operations">Operations</option>
                                    </select>
                                </td>
                                
                                <td x-show="columns[2].visible" class="p-2 relative">
                                    <div class="relative rounded">
                                        <span class="absolute inset-y-0 left-0 pl-2.5 flex items-center text-gray-400 text-sm pointer-events-none">$</span>
                                        <input type="text" 
                                               x-model="row.budget"
                                               @input="validateBudget(row)"
                                               class="w-full bg-transparent pl-6 pr-8 py-1 rounded border text-sm focus:outline-none transition-colors"
                                               :class="row.hasError ? 'border-red-500 bg-red-50 text-red-900 focus:ring-2 focus:ring-red-200' : 'border-transparent hover:border-gray-300 focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200'">
                                        
                                        <div x-show="row.hasError" class="absolute inset-y-0 right-0 pr-2 flex items-center pointer-events-none">
                                            <span class="text-red-500 text-xs font-bold" title="Must be a valid positive number">⚠️</span>
                                        </div>
                                    </div>
                                </td>
                                
                                <td x-show="columns[3].visible" class="p-2">
                                    <div class="flex items-center">
                                        <select x-model="row.status" 
                                                class="px-2.5 py-1 rounded-full text-xs font-semibold uppercase tracking-wider border-0 cursor-pointer focus:ring-2 focus:ring-indigo-200 focus:outline-none"
                                                :class="{
                                                    'bg-yellow-100 text-yellow-800': row.status === 'Pending',
                                                    'bg-blue-100 text-blue-800': row.status === 'In Progress',
                                                    'bg-green-100 text-green-800': row.status === 'Completed'
                                                }">
                                            <option value="Pending">Pending</option>
                                            <option value="In Progress">In Progress</option>
                                            <option value="Completed">Completed</option>
                                        </select>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>

                    <!--
                        Totals row. It lives inside the same <table> as the header
                        and body, so it inherits the exact same <colgroup> widths -
                        it will always line up with whichever columns are currently
                        visible, with no separate width bookkeeping needed.
                    -->
                    <tfoot x-show="showTotalRow" class="bg-gray-100 border-t-2 border-gray-300">
                        <tr>
                            <td class="p-2 text-center text-xs font-serif font-bold text-gray-400">Σ</td>
                            <template x-for="col in columns" :key="'total-' + col.id">
                                <td x-show="col.visible" class="p-2 align-top">
                                    <select x-model="col.aggregate"
                                            class="w-full text-xs bg-white border border-gray-300 rounded px-1.5 py-1 mb-1 cursor-pointer focus:outline-none focus:ring-2 focus:ring-indigo-200">
                                        <option value="none">—</option>
                                        <option value="sum" x-show="col.type === 'number'">Sum</option>
                                        <option value="average" x-show="col.type === 'number'">Average</option>
                                        <option value="min" x-show="col.type === 'number'">Min</option>
                                        <option value="max" x-show="col.type === 'number'">Max</option>
                                        <option value="count">Count</option>
                                    </select>
                                    <div class="font-mono font-semibold text-sm text-indigo-700 px-1.5" x-text="aggregateValue(col)"></div>
                                </td>
                            </template>
                        </tr>
                    </tfoot>
                    
                </table>
            </div>
            
            <div class="bg-gray-50 px-4 py-3 border-t border-gray-200 flex items-center justify-between gap-3">
                <button @click="addRow()" 
                        class="inline-flex items-center px-3.5 py-1.5 border border-transparent text-xs font-medium rounded-lg shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all">
                    + Add Row
                </button>

                <button @click="showTotalRow = !showTotalRow"
                        type="button"
                        class="inline-flex items-center gap-1.5 px-3.5 py-1.5 border text-xs font-medium rounded-lg shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
                        :class="showTotalRow ? 'bg-indigo-600 text-white border-transparent hover:bg-indigo-700' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'">
                    <span class="font-serif">Σ</span>
                    <span x-text="showTotalRow ? 'Hide Totals' : 'Show Totals'"></span>
                </button>
            </div>
        </div>
    </div>

    <script>
        function spreadsheetApp() {
            return {
                // Column definitions managing visibility and relative width rules.
                // "weight" replaces the old fixed w-2/5 / w-1/5 Tailwind classes:
                // those were only correct when all 4 columns were visible, so hiding
                // one column left the header cells' widths out of sync with the body
                // cells' widths. Weights are turned into percentages dynamically
                // (see colStyle), recalculated from whichever columns are visible
                // right now, so the header and body always agree.
                columns: [
                    { id: 'taskName', label: 'Task Name', visible: true, weight: 2, type: 'text', aggregate: 'none' },
                    { id: 'category', label: 'Category', visible: true, weight: 1, type: 'text', aggregate: 'none' },
                    { id: 'budget', label: 'Budget', visible: true, weight: 1, type: 'number', format: 'currency', aggregate: 'sum' },
                    { id: 'status', label: 'Status', visible: true, weight: 1, type: 'text', aggregate: 'none' }
                ],

                // Whether the Excel-style totals row at the bottom of the table is shown
                showTotalRow: true,
                
                // Pre-populated seed data providing high-salience structural anchors
                rows: [
                    { id: 1, taskName: 'Refactor UI core data-grid infrastructure', category: 'Development', budget: '4500', status: 'In Progress', hasError: false },
                    { id: 2, taskName: 'Design custom accessible typography palette', category: 'Design', budget: '1200', status: 'Completed', hasError: false },
                    { id: 3, taskName: 'Launch open-source documentation portal', category: 'Marketing', budget: 'abc', status: 'Pending', hasError: true },
                    { id: 4, taskName: 'Configure localized webhooks & API limits', category: 'Operations', budget: '850', status: 'Pending', hasError: false }
                ],
                
                // Computes the <col> width for a given column, as a share of the
                // space left over after the fixed 48px (w-12) "#" column, split
                // proportionally by weight among only the *currently visible*
                // columns. This is the single source of truth for column widths -
                // <col> widths override any width set on individual <th>/<td>
                // cells in table-fixed layout, so hiding/showing a column can never
                // leave the header and body cells disagreeing about width again.
                colStyle(col) {
                    if (!col.visible) return 'display: none;';
                    const totalWeight = this.columns
                        .filter(c => c.visible)
                        .reduce((sum, c) => sum + c.weight, 0);
                    if (totalWeight === 0) return 'display: none;';
                    const share = col.weight / totalWeight;
                    return `width: calc((100% - 3rem) * ${share});`;
                },

                // Add a clean template row to bypass analysis paralysis
                addRow() {
                    const nextId = this.rows.length ? Math.max(...this.rows.map(r => r.id)) + 1 : 1;
                    this.rows.push({
                        id: nextId,
                        taskName: '',
                        category: 'Development',
                        budget: '0',
                        status: 'Pending',
                        hasError: false
                    });
                },
                
                // Immediate validation checker handling messy data formatting inputs safely
                validateBudget(row) {
                    const cleanValue = row.budget.trim();
                    if (cleanValue === '') {
                        row.hasError = false;
                        return;
                    }
                    // Validate if it is a structured numeric digit
                    const isNumeric = !isNaN(cleanValue) && !isNaN(parseFloat(cleanValue));
                    const isPositive = parseFloat(cleanValue) >= 0;
                    
                    row.hasError = !(isNumeric && isPositive);
                },
                
                // Excel's AutoSum button: clicking the Σ in a numeric column's
                // header immediately sets that column's aggregate to "sum" and
                // reveals the totals row, the same way Excel's AutoSum jumps
                // straight to a SUM formula for the selected column.
                quickSum(col) {
                    col.aggregate = 'sum';
                    this.showTotalRow = true;
                },

                // Parses a column's values into numbers, ignoring blanks and
                // anything that fails validation (e.g. "abc" in Budget).
                numericValues(col) {
                    return this.rows
                        .map(row => parseFloat(String(row[col.id]).trim()))
                        .filter(val => !isNaN(val));
                },

                // Computes the value shown in the totals row for a given column,
                // based on that column's chosen aggregate function.
                aggregateValue(col) {
                    if (!col.aggregate || col.aggregate === 'none') return '';

                    if (col.aggregate === 'count') {
                        if (col.type === 'number') return this.numericValues(col).length;
                        return this.rows.filter(row => String(row[col.id] ?? '').trim() !== '').length;
                    }

                    // sum / average / min / max only apply to numeric columns
                    const nums = this.numericValues(col);
                    if (nums.length === 0) {
                        return col.format === 'currency' ? this.formatCurrency(0) : 0;
                    }

                    let result;
                    switch (col.aggregate) {
                        case 'sum': result = nums.reduce((a, b) => a + b, 0); break;
                        case 'average': result = nums.reduce((a, b) => a + b, 0) / nums.length; break;
                        case 'min': result = Math.min(...nums); break;
                        case 'max': result = Math.max(...nums); break;
                        default: return '';
                    }

                    return col.format === 'currency' ? this.formatCurrency(result) : this.formatNumber(result);
                },

                formatCurrency(value) {
                    return new Intl.NumberFormat('en-US', {
                        style: 'currency',
                        currency: 'USD'
                    }).format(value);
                },

                formatNumber(value) {
                    return new Intl.NumberFormat('en-US', { maximumFractionDigits: 2 }).format(value);
                }
            }
        }
    </script>
</body>
</html>
